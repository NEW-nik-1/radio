<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>радио онлайн - Music Club Золушка</title>

<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 100px;
        background: #f5f5f5;
    }

    h1{
        color: #333;
        margin-bottom: 30px;
    }

    .btn{
        display: inline-block;
        margin: 10px;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;

        background: linear-gradient(
            to bottom,
            #bdbdbd 0%,
            #8a8a8a 50%,
            #5f5f5f 100%
        );

        box-shadow:
            0 6px 0 #4a4a4a,
            0 8px 15px rgba(0,0,0,0.3);

        transition: all 0.15s ease;
    }

    .btn:hover{
        background: linear-gradient(
            to bottom,
            #d0d0d0 0%,
            #9c9c9c 50%,
            #707070 100%
        );

        transform: translateY(-2px);

        box-shadow:
            0 8px 0 #4a4a4a,
            0 12px 20px rgba(0,0,0,0.35);
    }

    .btn:active{
        transform: translateY(6px);

        box-shadow:
            0 0 0 #4a4a4a,
            0 3px 8px rgba(0,0,0,0.25);
    }

    #status{
        margin-top: 25px;
        color: #555;
        font-size: 14px;
    }
</style>
</head>
<body>

<h1>🎵 радио онлайн -  Music Club Золушка</h1>

<a class="btn"
   href="https://volnorez.com/music-club-zolushka"
   target="_blank">
    Открыть сайт
</a>

<a class="btn"
   href="https://m.volnorez.com/music-club-zolushka?slide=2"
   target="_blank">
    Открыть мобильную версию
</a>

<div id="status"> .</div>

<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const status = document.getElementById('status');

    try {
        await vkBridge.send('VKWebAppInit');

        const user = await vkBridge.send('VKWebAppGetUserInfo');

        status.innerHTML =
            '✅ VK Bridge подключён<br>' +
            'Пользователь: ' +
            user.first_name + ' ' +
            user.last_name;

        console.log('Пользователь VK:', user);

    } catch (error) {
        console.error(error);

        status.innerHTML =
            '⚠️ Приложение открыто вне VK или доступ к данным пользователя недоступен';
    }
});
</script>

</body>
</html>
