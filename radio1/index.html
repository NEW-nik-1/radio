<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Radio UI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
}

.radio-bar {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #C0C0C0;
  padding: 12px;
  height: 70px;
}

.left-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.right-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

button {
  background: #fff;
  color: #111;
  border: 0;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #e6e6e6;
}

.dropdown {
  position: relative;
}

.dropdown-content {
  position: absolute;
  top: 42px;
  left: 0;
  background: #fff;
  color: #111;
  width: 220px;
  max-height: 200px;
  overflow-y: auto;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px);
  transition: 0.25s ease;
}

.dropdown:hover .dropdown-content {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.station {
  padding: 10px;
  cursor: pointer;
}

.station:hover {
  background: #ddd;
}

.center-text {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 3px;
  opacity: 0.25;
  background: linear-gradient(90deg, #000, #fff, #000);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glowMove 4s linear infinite;
  pointer-events: none;
}

@keyframes glowMove {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 0%; }
  100% { background-position: 0% 0%; }
}

.visualizer {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 28px;
  width: 90px;
  opacity: 0.7;
}

.bar {
  width: 4px;
  height: 6px;
  background: linear-gradient(to top, rgba(0,200,80,0.9), rgba(255,0,0,0.9));
  transition: height 0.08s linear;
}

input[type="range"] {
  width: 120px;
}
</style>
</head>

<body>

<div class="radio-bar">

  <div class="left-controls">

    <button onclick="togglePlay()" id="playBtn">▶</button>

    <div class="dropdown">
      <button>📻 Список радио</button>
      <div class="dropdown-content">
        <div class="station" onclick="playRadio('https://stream-uk1.radioparadise.com/mp3-128')">Radio Paradise</div>
        <div class="station" onclick="playRadio('https://icecast.radiofrance.fr/fip-midfi.mp3')">FIP Radio</div>
        <div class="station" onclick="playRadio('https://icecast.omroep.nl/radio1-bb-mp3')">Radio 1 NL</div>
        <div class="station" onclick="playRadio('https://stream.zeno.fm/0r0xa792kwzuv')">Chill Radio</div>
      </div>
    </div>

    <div class="visualizer" id="bars"></div>

  </div>

  <div class="center-text">sound-radio</div>

  <div class="right-controls">
    <span>🔊</span>
    <input type="range" min="0" max="1" step="0.01" value="0.5"
           oninput="audio.volume=this.value">
  </div>

</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const barsContainer = document.getElementById("bars");

const BAR_COUNT = 18;

for (let i = 0; i < BAR_COUNT; i++) {
  const bar = document.createElement("div");
  bar.className = "bar";
  barsContainer.appendChild(bar);
}

const bars = document.querySelectorAll(".bar");

function togglePlay() {
  if (!audio.src) return;

  if (audio.paused) {
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
}

function playRadio(url) {
  audio.src = url;
  audio.play();
  playBtn.textContent = "⏸";
}

let audioCtx, analyser, source, dataArray;

function setupAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();

  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  analyser.fftSize = 64;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  animate();
}

function animate() {
  requestAnimationFrame(animate);

  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  bars.forEach((bar, i) => {
    let value = dataArray[i % dataArray.length] || 0;
    bar.style.height = (4 + (value / 255) * 24) + "px";
  });
}

audio.addEventListener("play", () => {
  setupAudio();
  audioCtx.resume();
});
</script>

</body>
</html>
